<!DOCTYPE html>
<html lang="en">
<head>
    <title>Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My Image Gallery</h1>
    </header>
    <main>
        <div class="gallery">
            <img src="https://plus.unsplash.com/premium_photo-1661877737564-3dfd7282efcb?q=80&w=1200" class="thumb">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200" class="thumb">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200" class="thumb">
            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1200" class="thumb">
        </div>
    
        <!-- Lightbox -->
        <div id="lightbox" class="hidden">
            <span id="close">&times;</span>
            <img id="bigImg">
        </div>
    </main>

    <footer>
        <p>&copy; All rights reserved</p>
    </footer>
    <script src="script.js"></script>

</body>
</html>
